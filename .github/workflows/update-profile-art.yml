name: Update profile art

"on":
  schedule:
    - cron: "17 6 * * *"   # ~06:17 UTC daily
  workflow_dispatch: {}     # lets you run it by hand from the Actions tab

permissions:
  contents: write

concurrency:
  group: profile-art
  cancel-in-progress: true

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      # daily job only needs requests + beautifulsoup4
      - run: pip install requests beautifulsoup4

      - run: python scripts/fetch_contributions.py --user ${{ github.repository_owner }}
      - run: python scripts/render_heatmap_svg.py

      # Guarantee a change every run so a commit always happens (keeps the
      # daily square green even on days the heatmap data didn't change).
      - name: Daily heartbeat
        run: date -u +"%Y-%m-%dT%H:%M:%SZ" > data/heartbeat.txt

      # Commit is authored as YOU (not github-actions[bot]) so it counts toward
      # your contribution graph. The author email must be verified on your
      # GitHub account.
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily profile update [skip ci]"
          file_pattern: "data/contributions.json contrib-heatmap.svg data/heartbeat.txt"
          commit_user_name: "Fezmustafah"
          commit_user_email: "faizmustafa968@gmail.com"
          commit_author: "Fezmustafah <faizmustafa968@gmail.com>"
